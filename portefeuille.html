<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portefeuille — Aandelenanalyse</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230A0A0A'/><polyline points='4,24 10,16 16,20 22,10 28,14' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #EEEEED;
      --surface:     #FFFFFF;
      --surface-2:   #E9E9E7;
      --text-1:      #0A0A0A;
      --text-2:      #555555;
      --text-3:      #999999;
      --accent:      #0A0A0A;
      --buy:         #166534;
      --buy-bg:      #F0FDF4;
      --buy-border:  #BBF7D0;
      --hold:        #854D0E;
      --hold-bg:     #FFFBEB;
      --hold-border: #FDE68A;
      --pass:        #991B1B;
      --pass-bg:     #FEF2F2;
      --pass-border: #FECACA;
      --border:      #E2E2E0;
      --radius:      16px;
      --radius-sm:   10px;
      --shadow:      0 1px 2px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.04);
      --transition:  0.22s cubic-bezier(0.4, 0, 0.2, 1);
      --font:        'Plus Jakarta Sans', -apple-system, sans-serif;
    }

    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    #main-header {
      background: rgba(255,255,255,0.94);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1320px; margin: 0 auto;
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .back-link {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--text-2);
      text-decoration: none;
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: color var(--transition), border-color var(--transition);
    }
    .back-link:hover { color: var(--text-1); border-color: var(--text-1); }
    .header-brand { display: flex; align-items: center; gap: 14px; }
    .brand-icon {
      font-size: 16px; color: #fff;
      width: 40px; height: 40px;
      background: var(--text-1);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: 700;
    }
    .brand-title { font-size: 17px; font-weight: 700; color: var(--text-1); letter-spacing: -0.3px; }
    .brand-subtitle { font-size: 12px; color: var(--text-3); margin-top: 1px; }
    .header-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px; white-space: nowrap;
    }
    .pill-neutral { background: var(--surface-2); color: var(--text-2); }
    .pill-green   { background: var(--buy-bg); color: var(--buy); border: 1px solid var(--buy-border); }
    .pill-red     { background: var(--pass-bg); color: var(--pass); border: 1px solid var(--pass-border); }

    /* ─── MAIN ─── */
    .container { max-width: 1320px; margin: 0 auto; padding: 40px 32px; }

    .section-title {
      font-size: 13px; font-weight: 700; color: var(--text-3);
      letter-spacing: 0.6px; text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ─── GRID ─── */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(540px, 1fr));
      gap: 18px;
    }

    /* ─── POSITIE CARD ─── */
    .pos-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 18px;
      animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .pos-card[data-oordeel="KOOP"] { border-top: 3px solid var(--text-1); }
    .pos-card[data-oordeel="HOLD"] { border-top: 3px solid var(--hold); }
    .pos-card[data-oordeel="PASS"] { border-top: 3px solid var(--pass); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* card header row */
    .card-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .card-identity { display: flex; flex-direction: column; gap: 3px; }
    .card-ticker-row { display: flex; align-items: center; gap: 8px; }
    .card-logo {
      width: 22px; height: 22px; border-radius: 5px;
      object-fit: contain; background: var(--surface-2);
      flex-shrink: 0; border: 1px solid var(--border);
    }
    .card-logo-fallback {
      width: 22px; height: 22px; border-radius: 5px;
      background: var(--text-1); color: #fff;
      font-size: 8px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-ticker { font-size: 16px; font-weight: 800; color: var(--text-1); letter-spacing: -0.3px; }
    .card-exchange {
      font-size: 11px; color: var(--text-3); font-weight: 600;
      background: var(--surface-2); padding: 2px 7px; border-radius: 4px;
    }
    .card-naam { font-size: 13px; font-weight: 600; color: var(--text-2); }
    .card-sector { font-size: 11px; color: var(--text-3); }
    .card-oordeel-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
      padding: 4px 11px; border-radius: 20px; white-space: nowrap;
      flex-shrink: 0; border: 1px solid;
    }
    .badge-KOOP { background: var(--text-1); color: #fff; border-color: var(--text-1); }
    .badge-HOLD { background: var(--hold-bg); color: var(--hold); border-color: var(--hold-border); }
    .badge-PASS { background: var(--pass-bg); color: var(--pass); border-color: var(--pass-border); }

    /* koers metrics row */
    .card-metrics {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .metric {
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .metric-label { font-size: 11px; font-weight: 600; color: var(--text-3); margin-bottom: 4px; }
    .metric-value {
      font-size: 20px; font-weight: 800; color: var(--text-1);
      letter-spacing: -0.5px; font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .metric-value.positive { color: var(--buy); }
    .metric-value.negative { color: var(--pass); }
    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* verkoop sectie */
    .verkoop-label {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      letter-spacing: 0.5px; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .verkoop-label::after {
      content: '';
      flex: 1; height: 1px; background: var(--border);
    }

    .verkoop-targets {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .target {
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      border: 1px solid;
    }
    .target-stop  { background: var(--pass-bg); border-color: var(--pass-border); }
    .target-basis { background: var(--hold-bg); border-color: var(--hold-border); }
    .target-opt   { background: var(--buy-bg);  border-color: var(--buy-border); }

    .target-name {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .target-stop  .target-name { color: var(--pass); }
    .target-basis .target-name { color: var(--hold); }
    .target-opt   .target-name { color: var(--buy); }

    .target-price {
      font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums; line-height: 1.1;
    }
    .target-stop  .target-price { color: var(--pass); }
    .target-basis .target-price { color: var(--hold); }
    .target-opt   .target-price { color: var(--buy); }

    .target-upside { font-size: 11px; font-weight: 600; color: var(--text-3); margin-top: 3px; }
    .target-action { font-size: 10px; color: var(--text-3); margin-top: 5px; }

    /* progress bar */
    .pb-wrapper { padding-bottom: 28px; }
    .pb-track {
      position: relative;
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
    }
    .pb-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pb-fill.positive { background: var(--text-1); }
    .pb-fill.negative { background: var(--pass); }

    /* scenario ticks */
    .pb-tick {
      position: absolute; top: -3px;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--surface);
      transform: translateX(-50%);
    }
    .pb-tick-stop  { background: var(--pass); }
    .pb-tick-basis { background: var(--hold); }
    .pb-tick-opt   { background: var(--buy); }

    /* current price marker */
    .pb-current {
      position: absolute; top: -5px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--text-1);
      border: 2px solid var(--surface);
      transform: translateX(-50%);
      box-shadow: 0 0 0 2px var(--text-1);
    }

    /* labels under the bar */
    .pb-labels {
      position: relative;
      height: 22px;
      margin-top: 6px;
    }
    .pb-lbl {
      position: absolute;
      font-size: 10px; font-weight: 600;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .pb-lbl-stop  { color: var(--pass); }
    .pb-lbl-basis { color: var(--hold); }
    .pb-lbl-opt   { color: var(--buy); }
    .pb-lbl-current { color: var(--text-1); font-weight: 800; }

    /* ─── SKELETON ─── */
    .skeleton {
      background: linear-gradient(90deg, #e9e9e7 25%, #f0f0ee 50%, #e9e9e7 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── ERROR STATE ─── */
    .error-card {
      background: var(--surface); border: 1px solid var(--pass-border);
      border-radius: var(--radius); padding: 20px 24px;
      font-size: 13px; color: var(--pass);
    }

    /* ─── NO ANALYSIS STATE ─── */
    .no-analysis-badge {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 9px; margin-top: 4px;
      display: inline-block;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .header-inner { padding: 14px 16px; }
      .container { padding: 24px 16px; }
      .portfolio-grid { grid-template-columns: 1fr; }
      .card-metrics { grid-template-columns: 1fr 1fr; }
      .verkoop-targets { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header id="main-header">
  <div class="header-inner">
    <div class="header-left">
      <a class="back-link" href="index.html">
        ← Alle analyses
      </a>
      <div class="header-brand">
        <div class="brand-icon">P</div>
        <div>
          <div class="brand-title">Portefeuille</div>
          <div class="brand-subtitle">Persoonlijke posities &amp; verkoopstrategie</div>
        </div>
      </div>
    </div>
    <div class="header-pills" id="header-pills">
      <span class="pill pill-neutral" id="pill-posities">— posities</span>
      <span class="pill pill-green"   id="pill-winst" style="display:none"></span>
      <span class="pill pill-red"     id="pill-verlies" style="display:none"></span>
    </div>
  </div>
</header>

<main class="container">
  <p class="section-title">Mijn posities</p>
  <div class="portfolio-grid" id="grid">
    <!-- skeleton placeholders -->
    <div style="height:320px" class="skeleton"></div>
    <div style="height:320px" class="skeleton"></div>
    <div style="height:320px" class="skeleton"></div>
    <div style="height:320px" class="skeleton"></div>
  </div>
</main>

<script>
const CURRENCY_SYMBOLS = {
  EUR: '€', USD: '$', GBP: '£', SEK: 'kr', NOK: 'kr', DKK: 'kr',
  PLN: 'zł', CHF: 'Fr', INR: '₹'
};

function fmtPrice(val, valuta) {
  if (val == null) return '—';
  const sym = CURRENCY_SYMBOLS[valuta] || valuta + ' ';
  const prefix = ['EUR','GBP','USD','CHF','INR'].includes(valuta);
  const num = Number(val).toLocaleString('nl-NL', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
  return prefix ? sym + num : num + ' ' + sym;
}

function fmtPct(val) {
  if (val == null) return '—';
  const sign = val >= 0 ? '+' : '';
  return sign + Number(val).toFixed(1) + '%';
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function pct2pos(value, low, high) {
  if (high === low) return 50;
  return clamp(((value - low) / (high - low)) * 100, 0, 100);
}

function buildCard(pos, data) {
  const meta = data.meta || {};
  const es   = data.executive_summary || {};
  const scenarios = es.fair_value_scenarios || [];

  const ticker   = meta.ticker || pos.ticker;
  const naam     = meta.naam   || pos.naam || ticker;
  const exchange = meta.exchange || '';
  const sector   = (meta.sector || '').split('—')[0].trim();
  const valuta   = meta.valuta || pos.valuta;
  const oordeel  = es.oordeel  || 'HOLD';
  const koers    = meta.koers;
  const domain   = meta.domein || '';

  const aankoop = pos.aankoopkoers;
  const rendement = koers != null && aankoop
    ? ((koers - aankoop) / aankoop) * 100
    : null;

  const pess = scenarios.find(s => s.scenario === 'Pessimistisch');
  const basis = scenarios.find(s => s.scenario === 'Basis');
  const opt   = scenarios.find(s => s.scenario === 'Optimistisch');

  // progress bar: range covers all values so current price is never clipped
  const allVals = [pess?.fair_value, basis?.fair_value, opt?.fair_value, koers, aankoop]
    .filter(v => v != null);
  const rangeMin = Math.min(...allVals);
  const rangeMax = Math.max(...allVals);
  const padding  = (rangeMax - rangeMin) * 0.08 || rangeMin * 0.1;
  const pbLow  = rangeMin - padding;
  const pbHigh = rangeMax + padding;
  const posCurrent  = koers  != null ? pct2pos(koers, pbLow, pbHigh) : null;
  const posAankoop  = aankoop != null ? pct2pos(aankoop, pbLow, pbHigh) : null;
  const posBasis    = basis   ? pct2pos(basis.fair_value, pbLow, pbHigh) : null;
  const posStop     = pess    ? pct2pos(pess.fair_value,  pbLow, pbHigh) : 0;
  const posOpt      = opt     ? pct2pos(opt.fair_value,   pbLow, pbHigh) : 100;

  const isPos = rendement == null ? null : rendement >= 0;
  const fillPct = posCurrent != null ? posCurrent : 50;

  // logo
  const logoHtml = domain
    ? `<img class="card-logo" src="https://logo.clearbit.com/${domain}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-logo-fallback" style="display:none">${ticker.substring(0,3)}</div>`
    : `<div class="card-logo-fallback">${ticker.substring(0,3)}</div>`;

  // upside from current to targets
  const upsideBasis = basis && koers ? ((basis.fair_value - koers) / koers * 100) : null;
  const upsideOpt   = opt   && koers ? ((opt.fair_value   - koers) / koers * 100) : null;
  const upsideStop  = pess  && koers ? ((pess.fair_value  - koers) / koers * 100) : null;

  return `
    <div class="pos-card" data-oordeel="${oordeel}">

      <!-- header -->
      <div class="card-head">
        <div class="card-identity">
          <div class="card-ticker-row">
            ${logoHtml}
            <span class="card-ticker">${ticker}</span>
            ${exchange ? `<span class="card-exchange">${exchange}</span>` : ''}
          </div>
          <div class="card-naam">${naam}</div>
          ${sector ? `<div class="card-sector">${sector}</div>` : ''}
        </div>
        <span class="card-oordeel-badge badge-${oordeel}">${oordeel}</span>
      </div>

      <!-- koers metrics -->
      <div class="card-metrics">
        <div class="metric">
          <div class="metric-label">Aankoopkoers</div>
          <div class="metric-value">${fmtPrice(aankoop, valuta)}</div>
          <div class="metric-sub">${valuta}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Huidige koers</div>
          <div class="metric-value">${fmtPrice(koers, valuta)}</div>
          <div class="metric-sub">peildatum ${meta.peildatum || '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Rendement</div>
          <div class="metric-value ${rendement == null ? '' : rendement >= 0 ? 'positive' : 'negative'}">
            ${fmtPct(rendement)}
          </div>
          <div class="metric-sub">t.o.v. aankoop</div>
        </div>
      </div>

      <!-- verkoop strategie -->
      ${scenarios.length > 0 ? `
      <div>
        <div class="verkoop-label">Verkoopstrategie</div>
      </div>

      <div class="verkoop-targets">
        <div class="target target-stop">
          <div class="target-name">Stop-loss</div>
          <div class="target-price">${fmtPrice(pess?.fair_value, valuta)}</div>
          <div class="target-upside">${fmtPct(upsideStop)} v/h huidig</div>
          <div class="target-action">Thesis herbeoordelen</div>
        </div>
        <div class="target target-basis">
          <div class="target-name">Bijsnijden</div>
          <div class="target-price">${fmtPrice(basis?.fair_value, valuta)}</div>
          <div class="target-upside">${fmtPct(upsideBasis)} v/h huidig</div>
          <div class="target-action">Deelpositie verkopen</div>
        </div>
        <div class="target target-opt">
          <div class="target-name">Volledig uitstappen</div>
          <div class="target-price">${fmtPrice(opt?.fair_value, valuta)}</div>
          <div class="target-upside">${fmtPct(upsideOpt)} v/h huidig</div>
          <div class="target-action">Positie sluiten</div>
        </div>
      </div>

      <!-- progress bar -->
      <div class="pb-wrapper">
        <div class="pb-track">
          <!-- fill to current price -->
          <div class="pb-fill ${isPos ? 'positive' : 'negative'}"
               style="width:${fillPct}%"></div>

          <!-- scenario ticks -->
          ${posStop  != null ? `<div class="pb-tick pb-tick-stop"  style="left:${posStop}%"></div>` : ''}
          ${posBasis != null ? `<div class="pb-tick pb-tick-basis" style="left:${posBasis}%"></div>` : ''}
          ${posOpt   != null ? `<div class="pb-tick pb-tick-opt"   style="left:${posOpt}%"></div>` : ''}

          <!-- current price -->
          ${posCurrent != null ? `<div class="pb-current" style="left:${posCurrent}%"></div>` : ''}
        </div>

        <!-- only show current price label to avoid overlap -->
        <div class="pb-labels">
          ${posCurrent != null ? `<span class="pb-lbl pb-lbl-current" style="left:${posCurrent}%">▲ nu</span>` : ''}
        </div>
      </div>
      ` : `<div class="no-analysis-badge">Geen verkoopscenario's beschikbaar</div>`}

    </div>
  `;
}

async function init() {
  const grid = document.getElementById('grid');

  let positions;
  try {
    positions = await fetch('positions.json').then(r => r.json());
  } catch(e) {
    grid.innerHTML = `<div class="error-card">Kan positions.json niet laden: ${e.message}</div>`;
    return;
  }

  // Load all TICKER.json in parallel
  const results = await Promise.allSettled(
    positions.map(pos =>
      fetch(`data/${pos.ticker}.json`)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    )
  );

  // Build cards
  let html = '';
  let aantalWinst = 0, aantalVerlies = 0;

  results.forEach((res, i) => {
    const pos = positions[i];
    if (res.status === 'fulfilled') {
      const data = res.value;
      const meta = data.meta || {};
      const koers = meta.koers;
      const aankoop = pos.aankoopkoers;
      if (koers != null && aankoop != null) {
        if (koers >= aankoop) aantalWinst++; else aantalVerlies++;
      }
      html += buildCard(pos, data);
    } else {
      html += `
        <div class="pos-card">
          <div class="card-head">
            <div class="card-identity">
              <div class="card-ticker-row">
                <div class="card-logo-fallback">${pos.ticker.substring(0,3)}</div>
                <span class="card-ticker">${pos.ticker}</span>
              </div>
              <div class="card-naam">${pos.naam || pos.ticker}</div>
            </div>
          </div>
          <div class="no-analysis-badge">Analyse nog niet beschikbaar</div>
        </div>`;
    }
  });

  grid.innerHTML = html;

  // Update header pills
  document.getElementById('pill-posities').textContent = `${positions.length} posities`;
  if (aantalWinst > 0) {
    const pw = document.getElementById('pill-winst');
    pw.textContent = `${aantalWinst} in de winst`;
    pw.style.display = '';
  }
  if (aantalVerlies > 0) {
    const pv = document.getElementById('pill-verlies');
    pv.textContent = `${aantalVerlies} in het verlies`;
    pv.style.display = '';
  }
}

init();
</script>

</body>
